<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Warframe Cycles — Offline</title>
<style>
body{margin:0;font-family:sans-serif;color:#eee;background:#000;overflow-x:hidden}
header{padding:10px;background:#111;display:flex;align-items:center;gap:10px}
header h1{margin:0;font-size:16px;color:#0af}
nav{margin-left:auto;display:flex;gap:10px}
nav select{padding:4px}
main{padding:10px;max-width:900px;margin:auto}
.panel{background:rgba(0,0,0,0.6);padding:10px;margin:10px 0;border-radius:8px}
.cycle{padding:8px;margin:6px 0;border:1px solid rgba(255,255,255,0.2);border-radius:6px}
canvas{display:block;margin:auto}
#star-bg{position:relative;width:100%;height:400px;background:#000 url('https://img.freepik.com/free-vector/solar-system-background_1284-12725.jpg?w=1480') center/cover no-repeat;border-radius:8px;overflow:hidden}
.planet{position:absolute;width:20px;height:20px;border-radius:50%;background:#0af;transform:translate(-50%,-50%)}
</style>
</head>
<body>
<header>
  <h1>Warframe Offline Cycles</h1>
  <nav>
    <select id="lang">
      <option value="en">EN</option>
      <option value="ru">RU</option>
    </select>
  </nav>
</header>

<main>
  <div id="star-bg">
    <div class="planet" id="planet-earth"></div>
    <div class="planet" id="planet-cetus" style="background:#ffb347"></div>
    <div class="planet" id="planet-vallis" style="background:#9be8a8"></div>
    <div class="planet" id="planet-cambion" style="background:#ff6"></div>
  </div>

  <div class="panel" id="cycles"></div>
  <div class="panel" id="baro"></div>
</main>

<script>
document.addEventListener("DOMContentLoaded",()=>{
  const langDict={
    en:{
      earth:"Earth (Day/Night)", cetus:"Cetus Plains", vallis:"Orb Vallis", cambion:"Cambion Drift",
      baro:"Baro Ki'Teer", day:"Day", night:"Night", arrives:"Arrives", onsite:"On-site", leaves:"Leaves"
    },
    ru:{
      earth:"Земля (День/Ночь)", cetus:"Цетус (Равнины)", vallis:"Орб Валлис", cambion:"Камбион Дрифт",
      baro:"Баро Китир", day:"День", night:"Ночь", arrives:"Прибытие", onsite:"На месте", leaves:"Уходит"
    }
  };
  let LANG="en";
  document.getElementById("lang").addEventListener("change",e=>{LANG=e.target.value;});

  // anchors
  const anchor=new Date("2025-01-01T00:00:00Z").getTime();
  const baroRef=new Date("2025-01-02T16:00:00Z").getTime();

  const cyclesDef=[
    {id:"earth",durDay:4*3600,durNight:4*3600,anchor},
    {id:"cetus",durDay:100*60,durNight:50*60,anchor},
    {id:"vallis",durDay:6*3600,durNight:6*3600,anchor},
    {id:"cambion",durDay:90*60,durNight:90*60,anchor}
  ];

  function fmt(sec){
    let m=Math.floor(sec/60),s=sec%60,h=Math.floor(m/60);m%=60;
    return (h?`${h}h `:"")+(m?`${m}m `:"")+s+"s";
  }

  function update(){
    const now=Date.now();
    const wrap=document.getElementById("cycles");
    wrap.innerHTML="";
    cyclesDef.forEach(c=>{
      const period=c.durDay+c.durNight;
      const passed=((now-c.anchor)/1000)%period;
      const isDay=passed<c.durDay;
      const left=isDay?c.durDay-passed:c.durNight-(passed-c.durDay);
      const el=document.createElement("div");el.className="cycle";
      el.textContent=langDict[LANG][c.id]+": "+(isDay?langDict[LANG].day:langDict[LANG].night)+
        " — "+fmt(Math.floor(left));
      wrap.appendChild(el);
    });

    // Baro
    const baroBox=document.getElementById("baro");
    const TWO=14*24*3600*1000;
    let arrival=baroRef;
    while(arrival+48*3600*1000<now) arrival+=TWO;
    if(now<arrival){
      baroBox.textContent=langDict[LANG].baro+" — "+langDict[LANG].arrives+" in "+fmt(Math.floor((arrival-now)/1000));
    }else if(now<=arrival+48*3600*1000){
      baroBox.textContent=langDict[LANG].baro+" — "+langDict[LANG].onsite+", "+langDict[LANG].leaves+" in "+fmt(Math.floor((arrival+48*3600*1000-now)/1000));
    }else{
      baroBox.textContent=langDict[LANG].baro;
    }
  }
  setInterval(update,1000);
  update();

  // simple orbit anim
  const starBg=document.getElementById("star-bg");
  const w=starBg.clientWidth,h=starBg.clientHeight,cx=w/2,cy=h/2;
  const planets=[
    {id:"planet-earth",r:80,speed:0.001},
    {id:"planet-cetus",r:120,speed:0.0008},
    {id:"planet-vallis",r:160,speed:0.0006},
    {id:"planet-cambion",r:200,speed:0.0004}
  ];
  function animate(){
    const t=Date.now();
    planets.forEach((p,i)=>{
      const el=document.getElementById(p.id);
      const a=t*p.speed;
      el.style.left=(cx+Math.cos(a)*p.r)+"px";
      el.style.top=(cy+Math.sin(a)*p.r)+"px";
    });
    requestAnimationFrame(animate);
  }
  animate();
});
</script>
</body>
</html>
