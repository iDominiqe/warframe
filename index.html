<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Warframe Star Map & Cycles</title>
<style>
body{margin:0;font-family:sans-serif;color:#eee;background:#0b0f13;overflow-y:auto}
header{padding:12px 18px;background:rgba(15,20,30,0.55);backdrop-filter:blur(12px);display:flex;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
header h1{margin:0;font-size:18px;color:#0af}
main{padding:20px;max-width:1200px;margin:auto}
.panel{background:rgba(20,25,35,0.45);backdrop-filter:blur(10px);padding:14px;margin:12px 0;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
canvas{display:block;width:100%;height:420px;border-radius:14px;margin-bottom:20px}
@media(max-width:600px){canvas{height:280px}}
.tooltip{position:absolute;padding:6px 10px;background:rgba(0,0,0,0.75);border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .2s}
</style>
</head>
<body>
<header><h1>Warframe Cycles — Star Map</h1></header>
<main>
  <div style="position:relative">
    <canvas id="star-map"></canvas>
    <div id="tooltip" class="tooltip"></div>
  </div>
  <div class="panel" id="baro"></div>
  <div class="panel" id="cycles"></div>
</main>

<script>
// ---------- CONFIG ----------
const anchor=new Date("2025-01-01T00:00:00Z").getTime();
const planets=[
  {id:"Earth",name:"Earth (Day/Night)",color:"#6fe3ff",r:80,speed:0.0006,size:12,glow:"#6fe3ff",durDay:4*3600,durNight:4*3600},
  {id:"Cetus",name:"Cetus (Plains)",color:"#ffb347",r:120,speed:0.0005,size:14,glow:"#ffb347",durDay:100*60,durNight:50*60},
  {id:"Vallis",name:"Orb Vallis",color:"#9be8a8",r:160,speed:0.0004,size:16,glow:"#9be8a8",durDay:6*3600,durNight:6*3600},
  {id:"Cambion",name:"Cambion Drift",color:"#ff6",r:200,speed:0.00035,size:13,glow:"#ffee88",durDay:90*60,durNight:90*60},
  {id:"Duviri",name:"Duviri",color:"#d9a6ff",r:240,speed:0.0003,size:18,glow:"#d9a6ff",durDay:24*3600,durNight:0},
  {id:"Zariman",name:"Zariman",color:"#a6d0ff",r:280,speed:0.00025,size:15,glow:"#a6d0ff",durDay:24*3600,durNight:0}
];

// stars background
const stars=Array.from({length:140},()=>({x:Math.random(),y:Math.random(),size:Math.random()*1.5}));

// ---------- CANVAS ----------
const canvas=document.getElementById("star-map");
const ctx=canvas.getContext("2d");
let W,H,mouseX=0,mouseY=0;
function resize(){W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W;canvas.height=H;}
resize();window.addEventListener("resize",resize);
document.addEventListener("mousemove",e=>{mouseX=e.clientX/W-0.5;mouseY=e.clientY/H-0.5;});

// ---------- TIME UTILS ----------
function fmt(sec){let m=Math.floor(sec/60),s=sec%60,h=Math.floor(m/60);m%=60;return (h?`${h}h `:"")+(m?`${m}m `:"")+s+"s";}
function nextCycle(c){const now=Date.now();const period=(c.durDay+c.durNight)*1000;const passed=((now-anchor)%period+period)%period;let isDay=passed<c.durDay*1000;let left=isDay?c.durDay*1000-passed:(c.durNight*1000-(passed-c.durDay*1000));return{isDay,left,ends:new Date(now+left)}}

// ---------- TOOLTIP ----------
const tooltip=document.getElementById("tooltip");
function showTooltip(x,y,text){tooltip.style.left=(x+12)+"px";tooltip.style.top=(y+12)+"px";tooltip.innerHTML=text;tooltip.style.opacity=1;}
function hideTooltip(){tooltip.style.opacity=0;}

// ---------- RENDER LOOP ----------
function draw(){
  ctx.clearRect(0,0,W,H);
  // background
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/1.2);
  g.addColorStop(0,"#0b0f13");g.addColorStop(1,"#05060a");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  stars.forEach(s=>{
    const px=s.x*W+mouseX*40,py=s.y*H+mouseY*40;
    ctx.fillStyle="rgba(255,255,255,"+(0.2+Math.random()*0.7)+")";
    ctx.fillRect(px,py,s.size,s.size);
  });
  // sun
  const sunGrad=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,70);
  sunGrad.addColorStop(0,"rgba(255,230,150,1)");
  sunGrad.addColorStop(0.6,"rgba(255,190,50,0.7)");
  sunGrad.addColorStop(1,"rgba(255,150,0,0)");
  ctx.fillStyle=sunGrad;ctx.beginPath();ctx.arc(W/2,H/2,70,0,Math.PI*2);ctx.fill();

  const t=Date.now();
  planets.forEach((p,i)=>{
    // orbit
    ctx.strokeStyle="rgba(255,255,255,0.08)";
    ctx.beginPath();ctx.arc(W/2,H/2,p.r,0,Math.PI*2);ctx.stroke();
    // pos
    const a=t*p.speed+i;const x=W/2+Math.cos(a)*p.r+mouseX*20;const y=H/2+Math.sin(a)*p.r+mouseY*20;
    // glow
    const glowGrad=ctx.createRadialGradient(x,y,0,x,y,p.size*3);
    glowGrad.addColorStop(0,p.glow);glowGrad.addColorStop(1,"transparent");
    ctx.fillStyle=glowGrad;ctx.beginPath();ctx.arc(x,y,p.size*3,0,Math.PI*2);ctx.fill();
    // planet
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);ctx.fill();
    // label
    ctx.fillStyle="rgba(255,255,255,0.85)";ctx.font="13px sans-serif";ctx.fillText(p.id,x+p.size+6,y+4);
    // hover detection
    canvas.onmousemove=(ev)=>{
      const rect=canvas.getBoundingClientRect();
      const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
      if(Math.hypot(mx-x,my-y)<p.size+8){
        const cyc=nextCycle(p);
        showTooltip(mx,my,`${p.name}<br>${cyc.isDay?"Day":"Night"}<br>Ends in: ${fmt(Math.floor(cyc.left/1000))}`);
      } else hideTooltip();
    };
  });
  requestAnimationFrame(draw);
}
draw();

// ---------- BARO ----------
function updateBaro(){
  const baroBox=document.getElementById("baro");
  const now=Date.now();const TWO=14*24*3600*1000;
  let arrival=new Date("2025-01-03T16:00:00Z").getTime(); // ближайшая пятница
  while(arrival+48*3600*1000<now)arrival+=TWO;
  if(now<arrival){
    baroBox.innerHTML=`<b>Baro Ki'Teer</b><br>Arrives in: ${fmt(Math.floor((arrival-now)/1000))}<br>At: ${new Date(arrival).toUTCString()}`;
  }else if(now<=arrival+48*3600*1000){
    baroBox.innerHTML=`<b>Baro Ki'Teer</b><br>On-site<br>Leaves in: ${fmt(Math.floor((arrival+48*3600*1000-now)/1000))}<br>At: ${new Date(arrival+48*3600*1000).toUTCString()}`;
  }
}
setInterval(updateBaro,1000);updateBaro();

// ---------- CYCLES LIST ----------
function updateCycles(){
  const now=Date.now();const wrap=document.getElementById("cycles");wrap.innerHTML="";
  planets.forEach(c=>{
    const cyc=nextCycle(c);
    const div=document.createElement("div");div.className="panel";
    div.innerHTML=`<b>${c.name}</b><br>Now: ${cyc.isDay?"Day":"Night"}<br>Ends in: ${fmt(Math.floor(cyc.left/1000))}<br>Next change at: ${cyc.ends.toUTCString()}`;
    wrap.appendChild(div);
  });
}
setInterval(updateCycles,1000);updateCycles();
</script>
</body>
</html>
