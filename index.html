<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe Cycles Tracker</title>
  <link rel="stylesheet" href="styles.css?v=2.0">
  <script defer src="locales.js"></script>
  <script defer src="app.js?v=2.0"></script>
</head>
<body>
  <!-- Анимированный фон -->
  <canvas id="space-bg"></canvas>

  <header>
    <nav>
      <div class="logo">🌌 Warframe Cycles</div>
      <div class="menu">
        <a href="#home">Home</a>
        <a href="#baro">Baro Ki'Teer</a>
        <a href="#events">Events</a>
        <a href="#alerts">Alerts</a>
        <a href="#streams">Devstreams</a>
        <a href="#status">Status</a>
        <a href="#wiki">Wiki</a>
        <select id="langSwitcher">
          <option value="en">EN</option>
          <option value="ru">RU</option>
        </select>
        <button id="themeToggle">🌙/☀️</button>
      </div>
    </nav>
  </header>

  <main>
    <section id="home" class="section">
      <h1>Open World Cycles</h1>
      <div id="star-map" class="star-map"></div>
    </section>

    <section id="baro" class="section">
      <h1>Baro Ki'Teer</h1>
      <div id="baro-info" class="card">Loading...</div>
    </section>

    <section id="events" class="section">
      <h1>Events</h1>
      <div id="events-list" class="card">Loading...</div>
    </section>

    <section id="alerts" class="section">
      <h1>Alerts</h1>
      <div id="alerts-list" class="card">Loading...</div>
    </section>

    <section id="streams" class="section">
      <h1>Devstreams & News</h1>
      <div id="streams-list" class="card">Loading...</div>
    </section>

    <section id="status" class="section">
      <h1>Warframe Status</h1>
      <canvas id="statusChart"></canvas>
    </section>

    <section id="wiki" class="section">
      <h1>Warframe Wiki</h1>
      <p class="card">Here will be added custom wiki pages...</p>
    </section>
  </main>
</body>
</html>
